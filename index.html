<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EL CIELO 在庫一覧</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f8f6f2; color: #2a2a2a; }
    header { background: linear-gradient(135deg, #1a1a2e, #0f3460); padding: 20px 20px 16px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { color: #fff; font-size: 20px; letter-spacing: 4px; font-family: Georgia, serif; }
    header p { color: #a8b2d8; font-size: 11px; margin-top: 4px; }
    .toolbar { background: #fff; padding: 12px 16px; border-bottom: 1px solid #ede9e3; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 5px 12px; border-radius: 16px; border: 1.5px solid #d0ccc5; background: #fff; color: #666; font-size: 12px; cursor: pointer; }
    .filter-btn.active { background: #4a4a8a; border-color: #4a4a8a; color: #fff; font-weight: 600; }
    .search { flex: 1; min-width: 160px; padding: 6px 12px; border: 1.5px solid #ddd; border-radius: 16px; font-size: 13px; outline: none; }
    .add-btn { margin-left: auto; padding: 7px 16px; background: linear-gradient(135deg, #4a4a8a, #7b5ea7); color: #fff; border: none; border-radius: 16px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .count { font-size: 11px; color: #aaa; }

    /* グリッド */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; padding: 16px; }
    .card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); cursor: pointer; transition: transform 0.15s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .card.sold { opacity: 0.6; }
    .photo-box { height: 180px; background: #f0eee8; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; }
    .no-photo { color: #ddd; font-size: 40px; }
    .sold-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
    .sold-label { background: #fff; color: #888; border-radius: 20px; padding: 4px 14px; font-weight: 700; font-size: 13px; }
    .card-body { padding: 10px 12px 14px; }
    .card-id { font-size: 10px; color: #fff; background: #4a4a8a; display: inline-block; padding: 2px 7px; border-radius: 5px; font-weight: 700; margin-bottom: 5px; }
    .card-name { font-size: 13px; font-weight: 600; color: #1a1a2e; line-height: 1.35; margin-bottom: 6px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 700; }
    .s-available { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .s-hold { background: #fff8e1; color: #e65100; border: 1px solid #ffe082; }
    .s-sold { background: #fce4ec; color: #880e4f; border: 1px solid #f48fb1; }
    .card-meta { font-size: 11px; color: #999; margin-top: 5px; }
    .card-price { font-size: 14px; font-weight: 800; color: #4a4a8a; margin-top: 5px; }
    .card-cost { font-size: 11px; color: #aaa; }
    .card-profit { font-size: 11px; color: #2e7d32; font-weight: 600; }

    /* モーダル */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 18px; width: min(95vw, 500px); max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
    .modal-header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 16px; color: #1a1a2e; }
    .modal-close { background: none; border: none; font-size: 22px; color: #aaa; cursor: pointer; }
    .modal-body { padding: 16px 20px 24px; }
    .modal-body label { display: block; font-size: 11px; font-weight: 600; color: #888; margin: 12px 0 4px; }
    .modal-body input, .modal-body select, .modal-body textarea { width: 100%; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
    .modal-body textarea { height: 60px; resize: vertical; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .photo-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1.5px solid #eee; }
    .photo-hint { font-size: 10px; color: #aaa; margin-top: 4px; }
    .save-btn { width: 100%; padding: 11px; background: linear-gradient(135deg, #4a4a8a, #7b5ea7); color: #fff; border: none; border-radius: 9px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 16px; }
    .cancel-btn { width: 100%; padding: 9px; background: #f5f5f5; color: #666; border: none; border-radius: 9px; font-size: 13px; cursor: pointer; margin-top: 8px; }
    .delete-btn { width: 100%; padding: 9px; background: #fff; color: #c0392b; border: 1.5px solid #e0a0a0; border-radius: 9px; font-size: 13px; cursor: pointer; margin-top: 6px; }
    .empty { text-align: center; padding: 60px 20px; color: #bbb; grid-column: 1/-1; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>EL CIELO</h1>
    <p>在庫管理一覧</p>
  </div>
  <span id="headerCount" style="color:#a8b2d8;font-size:12px"></span>
</header>

<div class="toolbar">
  <button class="filter-btn active" onclick="setFilter('全て',this)">全て</button>
  <button class="filter-btn" onclick="setFilter('在庫あり',this)">在庫あり</button>
  <button class="filter-btn" onclick="setFilter('取置中',this)">取置中</button>
  <button class="filter-btn" onclick="setFilter('SOLD',this)">SOLD</button>
  <input class="search" type="text" placeholder="🔍 番号・商品名・サイズ・カラー..." oninput="doSearch(this.value)">
  <span class="count" id="countLabel"></span>
  <button class="add-btn" onclick="openModal(null)">＋ 追加</button>
</div>

<div class="grid" id="grid"></div>

<!-- モーダル -->
<div class="overlay" id="overlay" onclick="closeOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">新規登録</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <label>商品名 *</label>
      <input id="f-name" placeholder="例：パープル×ベージュ フェザーデザイン">
      <label>カラー</label>
      <input id="f-color" placeholder="例：パープル×ベージュ×ホワイト">
      <div class="row2">
        <div><label>サイズ *</label><input id="f-size" placeholder="例：140"></div>
        <div><label>裏地</label><select id="f-lining"><option>なし</option><option>あり</option></select></div>
      </div>
      <div class="row2">
        <div><label>販売価格（円）</label><input id="f-price" type="number" placeholder="45000"></div>
        <div><label>仕入れ値（円）</label><input id="f-cost" type="number" placeholder="18000"></div>
      </div>
      <label>ステータス</label>
      <select id="f-status">
        <option>在庫あり</option><option>取置中</option><option>SOLD</option>
      </select>
      <label>備考</label>
      <textarea id="f-notes" placeholder="大会名、購入者メモなど"></textarea>

      <label>📸 写真URL（CloudinaryのURLを1行に1つ）</label>
      <textarea id="f-photos" placeholder="https://res.cloudinary.com/..." style="height:80px"></textarea>
      <div class="photo-hint">CloudinaryでアップロードしたURL（1行に1つ、複数枚OK）</div>
      <div class="photo-preview" id="photoPreview"></div>

      <button class="save-btn" onclick="saveItem()">保存する</button>
      <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
      <button class="delete-btn" id="deleteBtn" onclick="deleteItem()" style="display:none">削除する</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "elcielo-list-v2";

const INITIAL = [
  { id:"ELC-001", name:"パープル×ベージュ フェザーデザイン", color:"パープル×ベージュ×ホワイト", size:"140", lining:"なし", price:null, cost:null, status:"在庫あり", notes:"ノースリーブ・フェザー装飾", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-002", name:"ホワイト×ベージュ 長袖バタフライデザイン", color:"ホワイト×ベージュ×ピンク×ブルー", size:"130", lining:"なし", price:null, cost:null, status:"在庫あり", notes:"長袖・フリンジ裾", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-003", name:"ネイビー×ベージュ フリンジデザイン", color:"ネイビー×ベージュ×ホワイト", size:"150", lining:"なし", price:null, cost:null, status:"在庫あり", notes:"ノースリーブ・ホワイトフリンジ・フェザー肩装飾", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-004", name:"パープル×ピンク フェニックスデザイン", color:"パープル×ピンク×ブルー×ホワイト×ベージュ", size:"120", lining:"なし", price:null, cost:null, status:"在庫あり", notes:"ノースリーブ・バックキーホール・フリンジ裾", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-005", name:"ブラック×ピンク ストーンデザイン", color:"ブラック×ピンク", size:"150", lining:"なし", price:null, cost:null, status:"在庫あり", notes:"大粒ABストーン・ラインストーン豊富", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-006", name:"ピンク×ボルドー シルバーグリッターデザイン", color:"ピンク×ボルドー×ベージュ×シルバー", size:"140", lining:"あり", price:null, cost:null, status:"在庫あり", notes:"大粒カラーストーン・シルバーグリッター装飾", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-007", name:"パープル×ベージュ シルバーグリッターリーフ", color:"パープル×ベージュ×シルバー×ピンク", size:"140", lining:"なし", price:null, cost:null, status:"在庫あり", notes:"シルバーグリッターリーフ・パープルカラーストーン", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-008", name:"レッド×ベージュ シルバーグリッター炎デザイン", color:"レッド×ベージュ×シルバー×ピンク", size:"140", lining:"なし", price:null, cost:null, status:"在庫あり", notes:"ノースリーブ・ピンクチュールフリル・シルバーフリンジ", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-009", name:"グリーン×ベージュ シルバーグリッターリーフ", color:"グリーン×ベージュ×シルバー×水色", size:"130", lining:"なし", price:null, cost:null, status:"在庫あり", notes:"ノースリーブ・水色チュールフリル・シルバーフリンジ", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-010", name:"水色×ホワイト 長袖Vラインデザイン", color:"水色×ホワイト×ベージュ×イエロー", size:"140", lining:"なし", price:null, cost:null, status:"在庫あり", notes:"長袖・フリンジ裾・イエロー＆ターコイズストーン", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-011", name:"ネイビー×水色 ユニタード【A】", color:"ネイビー×水色×ベージュ×ゴールド", size:"150cm（胸74.5/腰58/臀76/肩38）", lining:"あり", price:null, cost:null, status:"在庫あり", notes:"ユニタード・長ズボン一体型", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-012", name:"ネイビー×水色 ユニタード【B】", color:"ネイビー×水色×ベージュ×ゴールド", size:"139cm（胸67/腰51/臀70/肩34）", lining:"あり", price:null, cost:null, status:"在庫あり", notes:"ユニタード・長ズボン一体型", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-013", name:"ネイビー×水色 ユニタード【C】", color:"ネイビー×水色×ベージュ×ゴールド", size:"144cm（胸71.5/腰57.5/臀78/肩35）", lining:"あり", price:null, cost:null, status:"在庫あり", notes:"ユニタード・長ズボン一体型", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-014", name:"ネイビー×水色 ユニタード【D】", color:"ネイビー×水色×ベージュ×ゴールド", size:"155cm（胸72/腰61/臀77/肩38）", lining:"あり", price:null, cost:null, status:"在庫あり", notes:"ユニタード・長ズボン一体型", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-015", name:"ネイビー×水色 ユニタード【E】", color:"ネイビー×水色×ベージュ×ゴールド", size:"160cm（胸76.5/腰60/臀77/肩37.5）", lining:"あり", price:null, cost:null, status:"在庫あり", notes:"ユニタード・長ズボン一体型", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-016", name:"ネイビー×水色 ユニタード【F】", color:"ネイビー×水色×ベージュ×ゴールド", size:"148cm（胸67/腰52/臀71.5/肩33）", lining:"あり", price:null, cost:null, status:"在庫あり", notes:"ユニタード・長ズボン一体型", photos:[], createdAt:"2026-05-27" },
  { id:"ELC-017", name:"レッド×ベージュ シルバークロスデザイン", color:"レッド×ベージュ×シルバー", size:"132cm（胸64/腰56/臀65/ガース115）", lining:"なし", price:null, cost:21850, status:"在庫あり", notes:"赤ハンダ様・仕入れ950元（¥21,850）", photos:[], createdAt:"2026-06-24" },
  { id:"ELC-018", name:"パステルマルチ シルバーVラインデザイン", color:"水色×ラベンダー×イエロー×ホワイト×ベージュ×シルバー", size:"155cm（胸75/腰60/臀80/肩37/ガース135）", lining:"なし", price:null, cost:26450, status:"在庫あり", notes:"仕入れ1150元（¥26,450）", photos:[], createdAt:"2026-06-24" },
];

const STATUS_CLS = { "在庫あり":"s-available", "取置中":"s-hold", "SOLD":"s-sold" };

let items = [];
let editingId = null;
let currentFilter = "全て";
let currentSearch = "";

(function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const parsed = JSON.parse(saved);
    const savedIds = new Set(parsed.map(i => i.id));
    const newItems = INITIAL.filter(i => !savedIds.has(i.id));
    items = [...parsed, ...newItems];
  } else {
    items = JSON.parse(JSON.stringify(INITIAL));
  }
  render();
})();

function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

function render() {
  const filtered = items.filter(i => {
    const ms = currentFilter === "全て" || i.status === currentFilter;
    const q = currentSearch.toLowerCase();
    const mq = !q || [i.id, i.name, i.color, i.size, i.notes].some(v => v && v.toLowerCase().includes(q));
    return ms && mq;
  });

  document.getElementById("countLabel").textContent = filtered.length + "件";
  document.getElementById("headerCount").textContent = items.length + "点管理中";

  const grid = document.getElementById("grid");
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">該当する商品がありません</div>';
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const profit = item.price && item.cost ? item.price - item.cost : null;
    const profitPct = profit && item.price ? Math.round(profit / item.price * 100) : null;
    const photo = item.photos && item.photos[0];
    const sold = item.status === "SOLD";
    return `
      <div class="card${sold?' sold':''}" onclick="openModal('${item.id}')">
        <div class="photo-box">
          ${photo ? `<img src="${photo}" alt="" loading="lazy">` : '<div class="no-photo">✦</div>'}
          ${sold ? '<div class="sold-overlay"><span class="sold-label">SOLD</span></div>' : ''}
        </div>
        <div class="card-body">
          <div class="card-id">${item.id}</div>
          <div class="card-name">${item.name}</div>
          <span class="badge ${STATUS_CLS[item.status]||'s-available'}">${item.status}</span>
          <div class="card-meta">Size: ${item.size||'—'} / 裏地: ${item.lining||'—'}</div>
          <div class="card-price">${item.price ? '¥'+Number(item.price).toLocaleString() : '<span style="color:#ccc;font-size:11px;font-weight:400">価格未設定</span>'}</div>
          <div class="card-cost">${item.cost ? '仕入: ¥'+Number(item.cost).toLocaleString() : ''}</div>
          ${profit ? `<div class="card-profit">粗利: ¥${profit.toLocaleString()} (${profitPct}%)</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function doSearch(v) { currentSearch = v; render(); }

function openModal(id) {
  editingId = id;
  const item = id ? items.find(i => i.id === id) : null;
  document.getElementById("modalTitle").textContent = item ? "編集: " + item.id : "新規登録";
  document.getElementById("f-name").value = item?.name || "";
  document.getElementById("f-color").value = item?.color || "";
  document.getElementById("f-size").value = item?.size || "";
  document.getElementById("f-lining").value = item?.lining || "なし";
  document.getElementById("f-price").value = item?.price || "";
  document.getElementById("f-cost").value = item?.cost || "";
  document.getElementById("f-status").value = item?.status || "在庫あり";
  document.getElementById("f-notes").value = item?.notes || "";
  const photos = item?.photos || [];
  document.getElementById("f-photos").value = photos.join("\n");
  updatePhotoPreview(photos);
  document.getElementById("deleteBtn").style.display = item ? "block" : "none";
  document.getElementById("overlay").classList.add("show");
}

function updatePhotoPreview(photos) {
  const preview = document.getElementById("photoPreview");
  preview.innerHTML = photos.filter(u=>u).map(u => `<img src="${u}" onerror="this.style.display='none'">`).join('');
}

document.getElementById("f-photos").addEventListener("input", function() {
  const urls = this.value.split("\n").map(u=>u.trim()).filter(u=>u);
  updatePhotoPreview(urls);
});

function closeModal() { document.getElementById("overlay").classList.remove("show"); }
function closeOutside(e) { if (e.target === document.getElementById("overlay")) closeModal(); }

function getNextId() {
  const nums = items.map(i => parseInt(i.id.replace("ELC-",""))||0);
  return "ELC-" + String(Math.max(...nums)+1).padStart(3,"0");
}

function saveItem() {
  const name = document.getElementById("f-name").value.trim();
  const size = document.getElementById("f-size").value.trim();
  if (!name || !size) { alert("商品名とサイズは必須です"); return; }
  const photos = document.getElementById("f-photos").value.split("\n").map(u=>u.trim()).filter(u=>u);
  const data = {
    id: editingId || getNextId(),
    name,
    color: document.getElementById("f-color").value.trim(),
    size,
    lining: document.getElementById("f-lining").value,
    price: document.getElementById("f-price").value ? Number(document.getElementById("f-price").value) : null,
    cost: document.getElementById("f-cost").value ? Number(document.getElementById("f-cost").value) : null,
    status: document.getElementById("f-status").value,
    notes: document.getElementById("f-notes").value.trim(),
    photos,
    createdAt: editingId ? items.find(i=>i.id===editingId)?.createdAt : new Date().toISOString().slice(0,10),
  };
  items = editingId ? items.map(i => i.id===editingId ? data : i) : [...items, data];
  persist();
  render();
  closeModal();
}

function deleteItem() {
  if (!confirm(editingId + " を削除しますか？")) return;
  items = items.filter(i => i.id !== editingId);
  persist();
  render();
  closeModal();
}
</script>
</body>
</html>
